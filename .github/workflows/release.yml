name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  validate-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract plugin.json version
        id: plugin_version
        run: |
          VERSION=$(jq -r '.version' .claude-plugin/plugin.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches plugin.json
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PLUGIN_VERSION="${{ steps.plugin_version.outputs.version }}"
          if [ "$TAG_VERSION" != "$PLUGIN_VERSION" ]; then
            echo "ERROR: Tag version '$TAG_VERSION' does not match plugin.json version '$PLUGIN_VERSION'"
            exit 1
          fi
          echo "Version match: $PLUGIN_VERSION"

  release:
    needs: validate-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract release notes from CHANGELOG.md
        run: |
          awk '/^## \[/{found++} found==1{print} found==2{exit}' CHANGELOG.md > /tmp/release-notes.md
          [ -s /tmp/release-notes.md ] || { echo "ERROR: No release notes extracted from CHANGELOG.md — check CHANGELOG format"; exit 1; }

      - name: Build plugin archive
        run: |
          ARCHIVE="project-workflows-${GITHUB_REF_NAME}.tar.gz"
          tar czf "$ARCHIVE" skills/ shared/ .claude-plugin/ README.md CHANGELOG.md
          echo "ARCHIVE_NAME=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release-notes.md
          files: ${{ env.ARCHIVE_NAME }}

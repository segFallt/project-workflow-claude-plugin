name: Auto Tag

on:
  push:
    branches: [main]
    paths:
      - '.claude-plugin/plugin.json'

permissions:
  contents: write

jobs:
  auto-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create version tag
        id: tag
        run: |
          VERSION=$(jq -r '.version' .claude-plugin/plugin.json)
          TAG="v${VERSION}"
          if git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
            echo "Tag $TAG already exists — skipping auto-tag"
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            echo "tag=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git tag "$TAG"
          git push origin "$TAG"
          echo "Created tag $TAG"
          echo "pushed=true" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Extract release notes from CHANGELOG.md
        if: steps.tag.outputs.pushed == 'true'
        run: |
          awk '/^## \[/{found++} found==1{print} found==2{exit}' CHANGELOG.md > /tmp/release-notes.md
          [ -s /tmp/release-notes.md ] || { echo "ERROR: No release notes extracted from CHANGELOG.md — check CHANGELOG format"; exit 1; }

      - name: Build plugin archive
        if: steps.tag.outputs.pushed == 'true'
        run: |
          ARCHIVE="project-workflows-${{ steps.tag.outputs.tag }}.tar.gz"
          tar czf "$ARCHIVE" skills/ shared/ .claude-plugin/ README.md CHANGELOG.md
          echo "ARCHIVE_NAME=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        if: steps.tag.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" \
            "${{ env.ARCHIVE_NAME }}" \
            --notes-file /tmp/release-notes.md \
            --title "${{ steps.tag.outputs.tag }}"
